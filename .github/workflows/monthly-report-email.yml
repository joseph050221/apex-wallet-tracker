name: Send Monthly Reports

on:
  schedule:
    # 13:00 UTC on the 1st of every month
    - cron: '0 13 1 * *'
  workflow_dispatch: {}
    # Lets you trigger this manually from the Actions tab in GitHub, for
    # testing -- Actions -> Send Monthly Reports -> Run workflow.

jobs:
  send-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Install dependencies
        run: npm ci

      - name: Send monthly report emails
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/send-monthly-reports.mjs
